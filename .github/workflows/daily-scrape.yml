name: Daily Web Scraper

on:
  schedule:
    # Runs at 12:00 AM UTC every day
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Install Puppeteer Browsers and System Deps
        run: sudo env "PATH=$PATH" bunx puppeteer browsers install chrome --install-deps

      - name: Run Scraper
        run: bun run scripts/updateFirmwareList.ts

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          if [ -n "$(git status --porcelain)" ]; then
            git commit -m "chore: automated scrape update $(date)"
            git push origin main
          else
            echo "No changes to commit"
          fi