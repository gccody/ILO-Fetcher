<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<script defer src='https://static.cloudflareinsights.com/beacon.min.js' data-cf-beacon='{"token": "628b2382196943d18af63f88df7127d7"}'></script>
		<script>
			// Prevent flash of wrong theme by reading localStorage before render
			(function() {
				const stored = localStorage.getItem('darkMode');
				const isDark = stored === null ? true : stored === 'true';
				if (isDark) {
					document.documentElement.classList.add('dark');
				}
			})();
		</script>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
